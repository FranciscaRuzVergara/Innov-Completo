server:
  port: 19090

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: "esta_es_mi_compleja_clave_secreta"

  cloud:
    gateway:
      routes:
        - id: task-service
          uri: http://ms-tareas:18081
          predicates:
            - Path=/tasks/**, /roles/**, /task-roles/**, /task-status/**

        - id: project-service
          uri: http://ms-proyectos:9090
          predicates:
            - Path=/projects/**, /kpis/**, /project-status/**

        - id: employee-service
          uri: http://ms-empleados:18080
          predicates:
            - Path=/employees/**

        - id: assignment-service
          uri: http://ms-asignaciones:18082
          predicates:
            - Path=/assignments/**

        - id: cliente-service
          uri: http://ms-cliente:9091
          predicates:
            - Path=/clientes/**

        - id: auth-service
          uri: http://ms-auth:9094
          predicates:
            - Path=/auth/**

        - id: bff-service
          uri: http://ms-bff:18086
          predicates:
            - Path=/bff/**

        - id: front-service
          uri: http://innov-front:5173
          predicates:
             - Path=/**
          filters:
            - RewritePath=/.*, /

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG
