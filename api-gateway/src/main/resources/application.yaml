server:
  port: 19090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: task-service
          uri: http://localhost:18081
          predicates:
            - Path=/tasks/**

        - id: project-service
          uri: http://localhost:9090
          predicates:
            - Path=/projects/**

        - id: employee-service
          uri: http://localhost:18080
          predicates:
            - Path=/employees/**

        - id: assignment-service
          uri: http://localhost:18082
          predicates:
            - Path=/assignments/**
